<script>
(function(){
  var cv=document.getElementById('clock-canvas');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  var dg=document.getElementById('clock-digital');
  var romans=['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
  function draw(){
    var now=new Date();
    var h=(now.getUTCHours()+8)%24,m=now.getMinutes(),s=now.getSeconds();
    ctx.clearRect(0,0,140,140);

    ctx.beginPath();ctx.arc(70,70,68,0,Math.PI*2);
    ctx.fillStyle='#f8f8f6';ctx.fill();
    ctx.strokeStyle='#ccc';ctx.lineWidth=2;ctx.stroke();

    for(var i=0;i<60;i++){
      var a=(i/60)*Math.PI*2-Math.PI/2,maj=i%5===0;
      var r1=maj?56:63;
      ctx.beginPath();
      ctx.moveTo(70+Math.cos(a)*r1,70+Math.sin(a)*r1);
      ctx.lineTo(70+Math.cos(a)*66,70+Math.sin(a)*66);
      ctx.strokeStyle=maj?'#333':'#bbb';ctx.lineWidth=maj?2:1;ctx.stroke();
    }

    romans.forEach(function(n,i){
      var a=(i/12)*Math.PI*2-Math.PI/2;
      ctx.fillStyle='#333';
      ctx.font='bold 8px Georgia,serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n,70+Math.cos(a)*50,70+Math.sin(a)*50);
    });

    function hand(ang,len,w,c){
      ctx.beginPath();ctx.moveTo(70,70);
      ctx.lineTo(70+Math.cos(ang)*len,70+Math.sin(ang)*len);
      ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();
    }
    hand(((h%12+m/60)/12)*Math.PI*2-Math.PI/2,36,4,'#222');
    hand(((m+s/60)/60)*Math.PI*2-Math.PI/2,52,2.5,'#444');
    hand((s/60)*Math.PI*2-Math.PI/2,58,1.5,'#c0392b');

    ctx.beginPath();ctx.arc(70,70,4,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();
    ctx.beginPath();ctx.arc(70,70,2,0,Math.PI*2);ctx.fillStyle='#222';ctx.fill();

    var hh=String(h).padStart(2,'0'),mm=String(m).padStart(2,'0'),ss=String(s).padStart(2,'0');
    dg.textContent=hh+':'+mm+':'+ss;
  }
  draw();setInterval(draw,1000);
})();
</script>
