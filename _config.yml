# -----------------------------------------------------------------------------
# Site Settings
# -----------------------------------------------------------------------------
locale                   : "en-US"
title                    : "Jianwei Yan 阎建玮"
title_separator          : "-"
name                     : "Jianwei Yan"
description              : "百人计划研究员，浙江大学外国语学院"
url                      : "https://andy-jwyan.github.io"
baseurl                  : ""
repository               : "andy-jwyan/andy-jwyan.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 200
timezone                 : Asia/Shanghai

# -----------------------------------------------------------------------------
# Author Information
# -----------------------------------------------------------------------------
author:
  name             : "阎建玮 · Jianwei Yan"
  avatar           : "citations.jpeg"
  bio              : "百人计划研究员 | 博士生导师<br>浙江大学外国语学院"
  location         : "Hangzhou, China"
  email            : "yanjianwei@aliyun.com"
  uri              : "https://person.zju.edu.cn/jwyan"
  googlescholar    : "https://scholar.google.com/citations?user=rvKyc_8AAAAJ&hl=en"
  orcid            : "https://orcid.org/0000-0002-2785-954X"
  researchgate     : "https://www.researchgate.net/profile/Jianwei-Yan-3"
  github           : "andy-jwyan"
  links:
    - label: "Scopus"
      icon: "fas fa-fw fa-database"
      url: "https://www.scopus.com/authid/detail.uri?authorId=57195479467"
    - label: "Web of Science"
      icon: "fas fa-fw fa-flask"
      url: "https://www.webofscience.com/wos/author/record/G-3630-2017"

# -----------------------------------------------------------------------------
# Site Footer
# -----------------------------------------------------------------------------
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/andy-jwyan"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=rvKyc_8AAAAJ&hl=en"

# -----------------------------------------------------------------------------
# Reading Files
# -----------------------------------------------------------------------------
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -----------------------------------------------------------------------------
# Conversion
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# -----------------------------------------------------------------------------
# Markdown Processing
# -----------------------------------------------------------------------------
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true
      share: true

# -----------------------------------------------------------------------------
# Sass/SCSS
# -----------------------------------------------------------------------------
sass:
  sass_dir: _sass
  style: compressed

# -----------------------------------------------------------------------------
# Outputting
# -----------------------------------------------------------------------------
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# -----------------------------------------------------------------------------
# Archives
# -----------------------------------------------------------------------------
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# -----------------------------------------------------------------------------
# HTML Compression
# -----------------------------------------------------------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
